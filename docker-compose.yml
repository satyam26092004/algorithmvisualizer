version: '3.8'

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: dsa-valkey
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: "./backend"
      dockerfile: Dockerfile
    container_name: dsa-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
    env_file:
      - "./backend/.env"
    depends_on:
      - valkey
    restart: always

  worker:
    build:
      context: "./backend"
      dockerfile: Dockerfile
    container_name: dsa-worker
    command: python worker.py
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
    env_file:
      - "./backend/.env"
    depends_on:
      - valkey
      - backend
    restart: always

  frontend:
    build:
      context: "."
      dockerfile: Dockerfile
    container_name: dsa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
