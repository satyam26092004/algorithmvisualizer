
services:
  redis:
    image: redis:7-alpine
    container_name: dsa-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: "./backend"
      dockerfile: Dockerfile
    container_name: dsa-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - "./backend/.env"
    depends_on:
      - redis
    restart: always

  worker:
    build:
      context: "./backend"
      dockerfile: Dockerfile
    container_name: dsa-worker
    command: rq worker --url redis://redis:6379
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - "./backend/.env"
    depends_on:
      - redis
      - backend
    restart: always

  frontend:
    build:
      context: "."
      dockerfile: Dockerfile
    container_name: dsa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
